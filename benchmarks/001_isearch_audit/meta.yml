benchmark_id: "001"
name: "isearch_audit"
date: "2026-03-12"
target_repo: "isearch"
target_commit_sha: "TODO"  # Заполнить перед прогоном: git -C ~/work/isearch rev-parse HEAD

description: >
  Глубокий аудит кодовой базы isearch на предмет
  инфраструктурных, логических и продуктовых ошибок.

environment:
  baseline_model: "Claude Opus 4.6"
  abra_model: "Claude Opus 4.6"
  verdict_model: "Claude Opus 4.6"
  abra_version: "2.5.0"

# Ground Truth: известные баги isearch.
# Этот файл НЕ передаётся тестируемым агентам.
# Используется только судьёй (verdict) для вычисления Recall.
ground_truth_bugs:
  - id: GT-1
    name: "E5 prefix mismatch"
    severity: critical
    description: >
      Модель эмбеддингов E5 требует префикс 'query:' / 'passage:'.
      Код использует модель без префикса — деградация качества поиска ~30%.
    layer: product

  - id: GT-2
    name: "Scope file_type filter mismatch"
    severity: critical
    description: >
      При поиске с ограничением scope=docs фильтр file_type не совпадает
      с реальными значениями в Qdrant. Результат — пустой массив или падение.
    layer: product

  - id: GT-3
    name: "Silent batch failures"
    severity: high
    description: >
      Qdrant может отклонить часть батча (невалидный формат ID: unsigned vs int64),
      но система не падает и не логирует потерю данных.
    layer: infrastructure

  - id: GT-4
    name: "Concurrency race condition"
    severity: high
    description: >
      Гонка данных при обновлении одних и тех же чанков из нескольких потоков.
      Нет блокировок на уровне коллекции.
    layer: infrastructure

# Качество
quality:
  baseline_recall: 0.50        # 2/4 (GT-2, GT-4)
  abra_recall: 0.50            # 2/4 (GT-1, GT-2)
  baseline_total: 21
  abra_total: 15
  baseline_extras: 19
  abra_extras: 13
  baseline_hallucinations: 0
  abra_hallucinations: 0
  # Weighted score: critical=3, high=2, medium=1, low=0.5
  baseline_weighted_score: null  # TODO
  abra_weighted_score: null      # TODO

# Ресурсы (заполнять из usage stats среды после прогона)
resources:
  baseline:
    input_tokens: null       # контекст (код проекта)
    output_tokens: null      # ответ агента
    total_tokens: null
    wall_time_min: null      # минуты от старта до финиша
    cost_usd: null           # по прайсу модели
  abra:
    init_tokens: null        # overhead: загрузка базы знаний (15 файлов)
    input_tokens: null       # контекст (код + база знаний + pipeline)
    output_tokens: null
    total_tokens: null
    wall_time_min: null
    cost_usd: null
  abra_overhead:             # расчётные
    extra_tokens: null       # abra.total - baseline.total
    extra_cost_usd: null     # abra.cost - baseline.cost
    overhead_pct: null       # (extra / baseline.total) * 100

# Эффективность
efficiency:
  baseline_cost_per_gt_bug: null     # cost / GT-bugs found
  abra_cost_per_gt_bug: null
  baseline_cost_per_finding: null    # cost / total findings
  abra_cost_per_finding: null
  baseline_critical_per_1k_tokens: null  # critical findings / (total_tokens / 1000)
  abra_critical_per_1k_tokens: null

verdict:
  winner: "abra"
  reason: >
    Равный recall (50%), но abra нашёл GT-1 (E5 prefix, ~30% degradation)
    + Path Traversal (security) + мета-паттерн (генератор багов).
  caveat: >
    Ресурсные метрики не собраны для 001 (ретроспективно недоступны).
    Начиная с 002 — обязательный сбор.
