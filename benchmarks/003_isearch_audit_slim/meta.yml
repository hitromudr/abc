benchmark_id: "003"
name: "isearch_audit_slim"
date: "2026-03-12"
target_repo: "isearch"
target_commit_sha: "MUST_SET_BEFORE_RUN"  # git -C ~/work/isearch rev-parse HEAD

description: >
  Аудит isearch на слимленной версии abracadabra (v3.0-slim).
  Цель: проверить, что радикальное сокращение базы знаний не ухудшает качество.

environment:
  baseline_model: "Claude Opus 4.6"
  abra_model: "Claude Opus 4.6"
  verdict_model: "Claude Opus 4.6"
  abra_version: "3.0-slim"

# Ground Truth (ОПЦИОНАЛЬНО — бонусная метрика, не основа вердикта).
# ВНИМАНИЕ: GT-1 и GT-2 исправлены в текущем коде isearch.
# GT валиден только для коммита из bench 001.
ground_truth_bugs:
  - id: GT-1
    name: "E5 prefix mismatch"
    severity: critical
    status: STALE  # исправлен: модель сменена на MiniLM
    description: >
      Модель E5 требует префикс 'query:'/'passage:'.
      Код не использует — деградация ~30%.
    layer: product

  - id: GT-2
    name: "Scope file_type filter mismatch"
    severity: critical
    status: STALE  # исправлен: chunker.py удалён
    description: >
      file_type "doc" vs "docs" — scope=docs сломан.
    layer: product

  - id: GT-3
    name: "Silent batch failures"
    severity: high
    status: ACTIVE
    description: >
      hash()-based ID недетерминистичен (PYTHONHASHSEED).
      Дубли при reindex. abs() удваивает коллизии.
    layer: infrastructure

  - id: GT-4
    name: "Concurrency race condition"
    severity: high
    status: ACTIVE
    description: >
      Гонка данных при параллельной индексации.
      Нет per-project блокировок.
    layer: infrastructure

# Качество (GT-free — основные метрики)
quality:
  baseline:
    total_findings: null
    verified: null           # подтверждены по коду
    plausible: null          # требуют runtime-проверки
    false_positives: null    # галлюцинации
    precision: null          # verified / total
    actionable: null         # с указанием строки + root cause + fix
    unique_findings: null    # не найдены другим отчётом
    weighted_score: null     # critical=3, high=2, medium=1, low=0.5
    files_read: null         # coverage
  abra:
    total_findings: null
    verified: null
    plausible: null
    false_positives: null
    precision: null
    actionable: null
    unique_findings: null
    weighted_score: null
    files_read: null

# GT recall (опционально)
gt_recall:
  baseline: null    # e.g. 2/4
  abra: null

# Ресурсы
resources:
  baseline:
    total_tokens: null
    wall_time_min: null
    cost_usd: null
  abra:
    init_tokens: null
    total_tokens: null
    wall_time_min: null
    cost_usd: null
  overhead:
    extra_tokens_pct: null   # (abra.total - baseline.total) / baseline.total * 100
    extra_time_pct: null

verdict:
  winner: null
  reason: null
