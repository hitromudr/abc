benchmark_id: '003'
name: isearch_audit_slim
date: '2026-03-12'
target_repo: isearch
target_commit_sha: MUST_SET_BEFORE_RUN
description: 'Аудит isearch на слимленной версии abracadabra (v3.0-slim). Цель: проверить,
  что радикальное сокращение базы знаний не ухудшает качество.

  '
environment:
  baseline_model: gemini/gemini-2.5-flash
  abra_model: gemini/gemini-2.5-flash
  verdict_model: gemini/gemini-2.5-flash
  abra_version: 3.0-slim
ground_truth_bugs:
- id: GT-1
  name: E5 prefix mismatch
  severity: critical
  status: STALE
  description: 'Модель E5 требует префикс ''query:''/''passage:''. Код не использует
    — деградация ~30%.

    '
  layer: product
- id: GT-2
  name: Scope file_type filter mismatch
  severity: critical
  status: STALE
  description: 'file_type "doc" vs "docs" — scope=docs сломан.

    '
  layer: product
- id: GT-3
  name: Silent batch failures
  severity: high
  status: ACTIVE
  description: 'hash()-based ID недетерминистичен (PYTHONHASHSEED). Дубли при reindex.
    abs() удваивает коллизии.

    '
  layer: infrastructure
- id: GT-4
  name: Concurrency race condition
  severity: high
  status: ACTIVE
  description: 'Гонка данных при параллельной индексации. Нет per-project блокировок.

    '
  layer: infrastructure
