benchmark_id: "002"
name: "isearch_audit_gemini"
date: "2026-03-12"
target_repo: "isearch"
target_commit_sha: "TODO"  # git -C ~/work/isearch rev-parse HEAD

description: >
  Тот же аудит isearch что и 001, но на Gemini 3.1 Pro.
  Цель: сравнить эффект abracadabra на другой модели.

environment:
  baseline_model: "Gemini 3.1 Pro"
  abra_model: "Gemini 3.1 Pro"
  verdict_model: "TBD"
  abra_version: "2.5.0"

# Ground Truth: идентичен 001.
ground_truth_bugs:
  - id: GT-1
    name: "E5 prefix mismatch"
    severity: critical
    description: >
      Модель эмбеддингов E5 требует префикс 'query:' / 'passage:'.
      Код использует модель без префикса — деградация качества поиска ~30%.
    layer: product

  - id: GT-2
    name: "Scope file_type filter mismatch"
    severity: critical
    description: >
      При поиске с ограничением scope=docs фильтр file_type не совпадает
      с реальными значениями в Qdrant. Результат — пустой массив или падение.
    layer: product

  - id: GT-3
    name: "Silent batch failures"
    severity: high
    description: >
      Qdrant может отклонить часть батча (невалидный формат ID: unsigned vs int64),
      но система не падает и не логирует потерю данных.
    layer: infrastructure

  - id: GT-4
    name: "Concurrency race condition"
    severity: high
    description: >
      Гонка данных при обновлении одних и тех же чанков из нескольких потоков.
      Нет блокировок на уровне коллекции.
    layer: infrastructure

