name: 🧠 Предложение нового фреймворка (Cognitive Framework Proposal)
description: Предложить добавить новую ментальную модель, фильтр или ось Октагона в Базу Знаний
title: "[FRAMEWORK]: <Название вашей модели / концепции>"
labels: ["enhancement", "cognitive-core"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## 🛑 Пре-Чеклист (Фильтр Декарта)
        Перед тем как предложить новый фреймворк, убедитесь, что он отвечает закону **Апоптоза** (не дублирует существующие).
        Мы не коллекционируем ментальные модели ради коллекции. Каждая модель должна быть физически применима к написанию кода или архитектуры.

  - type: input
    id: framework_name
    attributes:
      label: 1. Название Фреймворка / Модели
      description: Как это называется в науке/философии/инженерии?
      placeholder: "Например: Закон Конвея / Теория Игр / Мутационное тестирование"
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: 2. В какую часть Базы Знаний это встраивается?
      description: Укажите топологию вашего предложения.
      options:
        - 01_АБСОЛЮТНЫЕ_ФИЛЬТРЫ_ВХОДА (Как отсекать ложные задачи)
        - 02_КОГНИТИВНЫЙ_ЛАНДШАФТ (Фундаментальные законы систем)
        - 03_ИНЖЕНЕРНЫЙ_ОКТАГОН_ВЫЖИВАНИЯ (Новая ось проверки кода)
        - 05_ВЕКТОРЫ_МЫШЛЕНИЯ (Новый вектор атаки на проблему)
        - 06_ОРГАНИЧЕСКИЕ_СИСТЕМЫ (Работа с хаосом и децентрализацией)
        - Другое (предложу в описании)
    validations:
      required: true

  - type: textarea
    id: fundamental_law
    attributes:
      label: 3. Суть (Фундаментальный Инвариант)
      description: Опишите суть фреймворка в 1-2 предложениях без воды (NO YAPPING).
      placeholder: "Например: Организации проектируют системы, копирующие структуру их внутренних коммуникаций (Закон Конвея)."
    validations:
      required: true

  - type: textarea
    id: physical_grounding
    attributes:
      label: 4. Физическое заземление (Semantic Grounding)
      description: Как именно этот абстрактный философский закон применяется при анализе кода/архитектуры Агентом `abra`? Как он изменит генерацию контрактов?
      placeholder: "Например: При проектировании микросервисов abra будет проверять, не пытаемся ли мы разделить единую команду на два сервиса, что вызовет сетевой overhead."
    validations:
      required: true

  - type: textarea
    id: entropy_vector
    attributes:
      label: 5. Какой класс энтропии это убивает?
      description: Какую конкретную ошибку сейчас совершают LLM (или люди), которую предотвратит это правило?
    validations:
      required: true

  - type: checkboxes
    id: double_helix_check
    attributes:
      label: 6. Двойная Спираль
      description: Подтвердите понимание принципов школы.
      options:
        - label: Мое предложение решает целый класс проблем, а не локальный баг.
          required: true
        - label: Мое предложение содержит четкий критерий, как Агент должен это применять (Имплементация).
          required: true
